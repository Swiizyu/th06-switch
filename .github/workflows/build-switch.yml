name: Build Nintendo Switch Homebrew (.nro)

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Switch portlibs dependencies
        shell: bash
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm --needed \
            switch-sdl2 \
            switch-sdl2_image \
            switch-sdl2_ttf \
            switch-sdl2_mixer \
            switch-mesa \
            switch-libdrm_nouveau \
            switch-libpng \
            switch-libjpeg-turbo \
            switch-freetype \
            switch-zlib \
            switch-bzip2 \
            switch-libwebp

      - name: Generate embedded GLSL shader headers
        shell: bash
        run: |
          python3 scripts/gen_embeds.py

      - name: Ensure RomFS fallback resources exist
        shell: bash
        run: |
          mkdir -p romfs
          [ -f romfs/NotoSans-Regular.ttf ] || cp NotoSans-Regular.ttf romfs/ 2>/dev/null || true

      - name: Build Nintendo Switch binary (.nro)
        shell: bash
        run: |
          export DEVKITPRO=/opt/devkitpro
          export PATH=$DEVKITPRO/tools/bin:$PATH
          make -j$(nproc)

      - name: Inspect built artifacts
        shell: bash
        run: |
          ls -lh touhou6.nro || true

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: touhou6-switch
          path: touhou6.nro
          retention-days: 90

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: touhou6.nro
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
